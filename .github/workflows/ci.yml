name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: ./mvnw clean verify --batch-mode --no-transfer-progress

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: store-locator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name test-container -p 8080:8080 store-locator:${{ github.sha }}

      - name: Wait for health check
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo " Container is healthy"
              exit 0
            fi
            echo "Waiting for container... attempt $i"
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs test-container
          exit 1

      - name: Clean up container
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true
