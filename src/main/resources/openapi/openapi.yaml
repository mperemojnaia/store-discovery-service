openapi: 3.0.3
info:
  title: Closest Stores API
  description: API to find the 5 closest Jumbo stores to a given position
  version: 1.0.0

servers:
  - url: /

tags:
  - name: stores
    description: Store lookup operations

paths:
  /api/v1/stores/closest:
    get:
      tags:
        - stores
      summary: Find the 5 closest Jumbo stores
      description: Returns the 5 closest Jumbo stores to the given geographic position, sorted by distance ascending.
      operationId: getClosestStores
      parameters:
        - name: latitude
          in: query
          required: true
          description: Latitude of the position in decimal degrees (-90 to 90)
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: longitude
          in: query
          required: true
          description: Longitude of the position in decimal degrees (-180 to 180)
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: travelMode
          in: query
          required: false
          description: Travel mode for distance calculation (only used when distance strategy is google)
          schema:
            type: string
            enum:
              - driving
              - walking
              - bicycling
              - transit
      responses:
        '200':
          description: Successfully found closest stores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    StoreResponse:
      type: object
      required:
        - stores
        - distanceType
      properties:
        stores:
          type: array
          description: List of closest stores sorted by distance ascending
          items:
            $ref: '#/components/schemas/StoreItem'
        distanceType:
          type: string
          description: The distance calculation method used
          enum:
            - haversine
            - google
            - ors

    StoreItem:
      type: object
      required:
        - city
        - postalCode
        - street
        - addressName
        - uuid
        - longitude
        - latitude
        - complexNumber
        - showWarningMessage
        - todayOpen
        - locationType
        - collectionPoint
        - sapStoreID
        - todayClose
        - distance
      properties:
        city:
          type: string
          description: City where the store is located
        postalCode:
          type: string
          description: Postal code of the store
        street:
          type: string
          description: Street address of the store
        street2:
          type: string
          description: Additional street address line
        street3:
          type: string
          description: Additional street address line
        addressName:
          type: string
          description: Display name of the store
        uuid:
          type: string
          description: Unique identifier of the store
        longitude:
          type: number
          format: double
          description: Longitude of the store in decimal degrees
        latitude:
          type: number
          format: double
          description: Latitude of the store in decimal degrees
        complexNumber:
          type: string
          description: Complex number identifier
        showWarningMessage:
          type: boolean
          description: Whether to show a warning message for this store
        todayOpen:
          type: string
          description: Opening time for today
        locationType:
          type: string
          description: Type of location (e.g., Supermarkt)
        collectionPoint:
          type: boolean
          description: Whether the store is a collection point
        sapStoreID:
          type: string
          description: SAP store identifier
        todayClose:
          type: string
          description: Closing time for today
        distance:
          type: number
          format: double
          description: Distance from the given position in kilometers, rounded to 2 decimal places

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code
        message:
          type: string
          description: Descriptive error message
        timestamp:
          type: string
          description: ISO 8601 timestamp of when the error occurred
